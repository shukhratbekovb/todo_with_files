# Количество рабочих процессов (количество CPU)
worker_processes auto;

# Максимум одновременных соединений
events {
    worker_connections 1024;
}

http {
    # MIME
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Формат логов
    # remote_addr - ip адрес
    # remote_user - имя пользователя
    # 192.168.0.1 - admin [дата и время]
    # 192.168.0.1 "GET"
    log_format main '$remote_addr - "$request" [$time_local] $status';

    access_log /var/log/nginx/access.log main; # лог всех запросов
    error_log /var/log/nginx/error.log warn; # лог ошибок

    sendfile on;

    tcp_nopush on;
    tcp_nodelay on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    gzip_min_length 1000;

    keepalive_timeout 65;

    client_max_body_size 50M;

    include /etc/nginx/conf.d/*.conf;
}